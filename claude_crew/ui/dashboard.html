<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>claude-crew · Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: oklch(0.91 0.016 236);
      --bg-1: oklch(0.83 0.026 237);
      --bg-2: oklch(0.74 0.034 238);
      --bg-3: oklch(0.64 0.042 239);
      --bg-4: oklch(0.54 0.050 240);
      --line: oklch(0.60 0.044 239);
      --line-soft: oklch(0.72 0.032 238);
      --fg-0: oklch(0.13 0.068 262);
      --fg-1: oklch(0.22 0.074 260);
      --fg-2: oklch(0.40 0.055 257);
      --fg-3: oklch(0.55 0.040 253);
      --accent: oklch(0.55 0.210 240);
      --accent-soft: oklch(0.55 0.210 240 / 0.14);
      --accent-line: oklch(0.55 0.210 240 / 0.45);

      --st-idle:     oklch(0.50 0.038 257);
      --st-thinking: oklch(0.62 0.15 75);
      --st-tool:     oklch(0.55 0.16 290);
      --st-waiting:  oklch(0.55 0.16 240);
      --st-done:     oklch(0.57 0.15 150);
      --st-error:    oklch(0.53 0.18 25);

      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'Geist Mono', 'Fira Code', monospace;
    }

    html, body, #root {
      height: 100%;
      background: var(--bg-0);
      color: var(--fg-0);
      font-family: var(--font-sans);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    #root { display: flex; flex-direction: column; overflow: hidden; }

    .mono { font-family: var(--font-mono); }

    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      height: 20px; padding: 0 7px; border-radius: 10px;
      background: var(--bg-2); border: 1px solid var(--line);
      font-size: 10.5px; color: var(--fg-2);
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.idle        { background: var(--st-idle); }
    .dot.thinking    { background: var(--st-thinking); animation: pulse 1.6s ease-in-out infinite; }
    .dot.tool-use    { background: var(--st-tool);     animation: pulse 1.6s ease-in-out infinite; }
    .dot.waiting     { background: var(--st-waiting); }
    .dot.active      { background: var(--st-done); }
    .dot.done        { background: var(--st-done); }
    .dot.error       { background: var(--st-error); }
    .dot.unreachable { background: var(--st-error); opacity: 0.5; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* F22 D-1: column-top accent bar for cross-column scan signal (SC-1).
       3px high, full width. Tool-color tinted when in-flight. <5s: muted
       (active class, opacity 0.5). >=5s: full opacity + pulse (stuck class,
       reuses the existing pulse keyframe so column reads as one organism). */
    .agent-column-accent {
      height: 3px;
      flex-shrink: 0;
      background: transparent;
      transition: background 0.2s ease, opacity 0.2s ease;
    }
    .agent-column-accent.active {
      background: var(--st-tool);
      opacity: 0.5;
    }
    .agent-column-accent.stuck {
      background: var(--st-tool);
      opacity: 1;
      animation: pulse 1.6s ease-in-out infinite;
    }

    /* F22 D-2/D-10: dedicated tool-chip row (always reserved 22px regardless
       of in-flight state — prevents layout strobing on rapid Pre/Post pairs). */
    .tool-chip-row {
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--bg-0);
      overflow: hidden;
    }
    .tool-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 18px;
      padding: 0 8px;
      border-radius: 4px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-1);
      max-width: 100%;
      min-width: 0;
    }
    .tool-chip .tool-name {
      color: var(--st-tool);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .tool-chip .tool-elapsed {
      color: var(--fg-2);
      flex-shrink: 0;
    }
    .tool-chip .tool-count {
      color: var(--fg-3);
      flex-shrink: 0;
    }
    /* F22 D-6: pulse threshold at displayed elapsed >=5s. Reuses pulse keyframe. */
    .tool-chip.stuck .tool-elapsed {
      animation: pulse 1.6s ease-in-out infinite;
    }
    .tool-chip.settled {
      background: var(--bg-1);
      opacity: 0.85;
    }

    /* ui-agent-transparency: dead-teammate row dimming */
    .tm-row-dead {
      opacity: 0.45;
      filter: grayscale(0.35);
      pointer-events: auto; /* keep chips/panel clickable */
    }

    /* ui-agent-transparency: config chips strip */
    .tm-config-chips {
      display: flex; gap: 5px; padding: 4px 14px;
      flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--line-soft);
      background: var(--bg-0);
      flex-shrink: 0; min-height: 26px; cursor: pointer;
    }
    .tm-config-chip {
      display: inline-flex; align-items: center;
      height: 18px; padding: 0 7px; border-radius: 9px;
      background: var(--bg-2); border: 1px solid var(--line);
      font-size: 10px; color: var(--fg-2);
      white-space: nowrap;
    }
    /* lead-extends-teammate-tools-and-skills: visually distinct extras chip */
    .tm-config-chip-extra {
      background: oklch(0.62 0.15 75 / 0.12);
      border-color: oklch(0.62 0.15 75 / 0.40);
      color: oklch(0.40 0.12 75);
    }
    /* detail panel backdrop + panel */
    .tm-detail-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: oklch(0.10 0.01 240 / 0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .tm-detail-panel {
      background: var(--bg-1); border: 1px solid var(--line);
      border-radius: 8px; padding: 22px 24px;
      width: min(640px, 90vw); max-height: 85vh;
      overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 8px 32px oklch(0.10 0.01 240 / 0.30);
    }
    .tm-detail-section { display: flex; flex-direction: column; gap: 4px; }
    .tm-detail-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--fg-3);
    }
    .tm-detail-value { font-size: 12px; color: var(--fg-0); }
    .tm-detail-prompt {
      font-family: var(--font-mono); font-size: 11px; color: var(--fg-1);
      background: var(--bg-2); border: 1px solid var(--line);
      border-radius: 4px; padding: 8px 10px;
      max-height: 60vh; overflow: auto;
      white-space: pre-wrap; word-break: break-word;
      margin: 0;
    }
    .tm-detail-list {
      display: flex; flex-wrap: wrap; gap: 4px; margin: 0; padding: 0;
      list-style: none;
    }
    .tm-detail-list-item {
      display: inline-flex; align-items: center;
      height: 20px; padding: 0 8px; border-radius: 4px;
      background: var(--bg-2); border: 1px solid var(--line);
      font-family: var(--font-mono); font-size: 11px; color: var(--fg-1);
    }

    /* dead-teammate-ui-segregation */
    .terminated-section { border-top: 1px solid var(--line); margin-top: 8px; flex-shrink: 0; }
    .terminated-header {
      width: 100%; text-align: left; background: none; border: none;
      cursor: pointer; padding: 6px 12px;
      color: var(--fg-3); font-size: 11px;
      letter-spacing: 0.05em; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-sans);
    }
    .terminated-header:hover { color: var(--fg-1); }
    .terminated-list { padding: 4px 0; }
    .terminated-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px; cursor: pointer; opacity: 0.6;
    }
    .terminated-row:hover { opacity: 0.9; background: var(--bg-1); }

    /* startup-diagnostics-dashboard: reuses terminated-section visual idiom */
    .startup-notices-section { border-bottom: 1px solid var(--line); flex-shrink: 0; background: var(--bg-1); }
    .startup-notices-header {
      width: 100%; text-align: left; background: none; border: none;
      cursor: pointer; padding: 6px 12px;
      color: var(--fg-2); font-size: 11px;
      letter-spacing: 0.05em; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-sans);
    }
    .startup-notices-header:hover { color: var(--fg-1); }
    .startup-notices-list { padding: 4px 0; }
    .startup-notice-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px;
      font-family: var(--font-mono); font-size: 11px; color: var(--fg-1);
    }
    .startup-notice-row.startup-notice-info { opacity: 0.7; }
    .ctx-window-bar {
      display: inline-flex; align-items: center; gap: 6px;
      margin-left: auto; font-size: 10.5px; color: var(--fg-3);
      font-family: var(--font-mono); cursor: default;
    }
    .ctx-window-bar-track {
      display: inline-block;
      width: 64px; height: 5px; border-radius: 3px;
      background: var(--bg-2); overflow: hidden;
    }
    .ctx-window-bar-fill {
      display: block;
      height: 100%; transition: width 0.25s ease, background-color 0.25s ease;
    }
    .ctx-window-bar-fill.ctx-ok      { background: oklch(0.62 0.15 145); }
    .ctx-window-bar-fill.ctx-warn    { background: oklch(0.65 0.18 75); }
    .ctx-window-bar-fill.ctx-danger  { background: oklch(0.55 0.20 25); }
    .startup-notice-badge {
      display: inline-block;
      padding: 0 6px; border-radius: 3px;
      font-family: var(--font-sans); font-weight: 600; font-size: 10px;
      letter-spacing: 0.05em;
      flex-shrink: 0; min-width: 44px; text-align: center;
    }
    .startup-notice-badge-info {
      background: var(--bg-2); color: var(--fg-2);
    }
    .startup-notice-badge-warning {
      background: oklch(0.62 0.15 75 / 0.20); color: oklch(0.40 0.15 75);
    }
    .startup-notice-badge-error {
      background: oklch(0.53 0.18 25 / 0.20); color: oklch(0.40 0.18 25);
    }
    .startup-notice-source {
      color: var(--fg-3); flex-shrink: 0;
    }
    .startup-notice-category {
      color: var(--fg-3); flex-shrink: 0;
    }
    .startup-notice-message {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .startup-notice-message:hover { white-space: normal; word-break: break-word; }
    .startup-notices-toggle {
      margin-left: auto; background: none; border: 1px solid var(--line);
      cursor: pointer; padding: 2px 8px; border-radius: 3px;
      font-family: var(--font-sans); font-size: 10px; color: var(--fg-2);
      text-transform: none; letter-spacing: 0;
    }
    .startup-notices-toggle:hover { color: var(--fg-1); background: var(--bg-2); }

    /* roster-spotlight: left-rail roster row.
       Two-line layout, leading vertical accent bar (3px), click toggles
       spotlight inclusion. Selected: brighter bg. Unselected: dim. */
    .roster-section {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      display: flex; flex-direction: column;
      background: var(--bg-0);
    }
    .roster-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      font-size: 11px; color: var(--fg-3);
      letter-spacing: 0.05em; text-transform: uppercase;
      border-bottom: 1px solid var(--line-soft);
      background: var(--bg-1);
      flex-shrink: 0;
      position: sticky; top: 0; z-index: 1;
    }
    .roster-section-header-count {
      color: var(--fg-2);
    }
    .roster-section-action {
      margin-left: auto; background: none; border: 1px solid var(--line);
      cursor: pointer; padding: 2px 8px; border-radius: 3px;
      font-family: var(--font-sans); font-size: 10px; color: var(--fg-2);
      text-transform: none; letter-spacing: 0;
    }
    .roster-section-action:hover { color: var(--fg-1); background: var(--bg-2); }
    .roster-section-action:disabled { cursor: default; opacity: 0.4; }

    .roster-empty {
      padding: 16px 14px; font-size: 11px; color: var(--fg-3);
      text-align: center;
    }

    .roster-row {
      position: relative;
      display: grid;
      grid-template-columns: 22px 1fr auto;
      grid-template-rows: auto auto;
      column-gap: 8px; row-gap: 2px;
      padding: 7px 12px 7px 16px;
      border-bottom: 1px solid var(--line-soft);
      cursor: pointer;
      transition: background 0.12s ease, opacity 0.12s ease;
      background: transparent;
    }
    .roster-row::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.2s ease, opacity 0.2s ease;
    }
    .roster-row.tool-active::before { background: var(--st-tool); opacity: 0.5; }
    .roster-row.tool-stuck::before  { background: var(--st-tool); opacity: 1; animation: pulse 1.6s ease-in-out infinite; }
    .roster-row:hover { background: var(--bg-1); }
    .roster-row.selected { background: var(--accent-soft); }
    .roster-row.selected:hover { background: var(--accent-soft); filter: brightness(1.04); }
    .roster-row.unselected { opacity: 0.55; }
    .roster-row.unselected:hover { opacity: 0.85; }

    .roster-row-avatar { grid-row: 1 / span 2; align-self: center; }
    .roster-row-identity {
      grid-column: 2; grid-row: 1;
      display: flex; align-items: center; gap: 6px;
      min-width: 0;
    }
    .roster-row-name {
      font-size: 12.5px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }
    .roster-row-role {
      font-size: 10.5px; color: var(--fg-3); font-weight: 400;
      flex-shrink: 0;
    }
    .roster-row-trailing-top {
      grid-column: 3; grid-row: 1;
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .roster-row-meta {
      grid-column: 2 / span 2; grid-row: 2;
      display: flex; align-items: center; gap: 6px;
      min-width: 0;
      font-size: 10.5px; color: var(--fg-2);
    }
    .roster-row-meta .ctx-window-bar { margin-left: 0; }
    .roster-row-meta-spacer { flex: 1; min-width: 4px; }
    .roster-row-tool-slot {
      min-width: 0; overflow: hidden;
      max-width: 50%;
    }
    .roster-row-ago {
      flex-shrink: 0; font-family: var(--font-mono);
      font-size: 10px; color: var(--fg-3);
    }
    .roster-row-cost {
      flex-shrink: 0; font-family: var(--font-mono);
      font-size: 10.5px; color: var(--fg-2);
    }

    /* roster-spotlight: pinned topology block at bottom of rail */
    .rail-topology {
      flex: 0 0 auto;
      border-top: 1px solid var(--line);
      background: var(--bg-1);
    }

    /* roster-spotlight: spotlight empty-state */
    .spotlight-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 32px; color: var(--fg-3); font-size: 12px; text-align: center;
      background: var(--bg-0);
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- WebSocket live state hook ---
    function useLiveState() {
      const [state, setState] = useState(null);
      // F22 D-5: capture performance.now() at message arrival as the monotonic
      // anchor for the elapsed-counter tick. Paired with each instance's
      // server-stamped now_wallclock to compute elapsed seconds independent
      // of NTP corrections and tab-suspend wall-clock jumps.
      const [perfAtArrival, setPerfAtArrival] = useState(0);
      const [connected, setConnected] = useState(false);
      useEffect(() => {
        let ws, timer;
        const connect = () => {
          ws = new WebSocket(`ws://${window.location.host}/ws`);
          ws.onopen = () => setConnected(true);
          ws.onmessage = e => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'state') {
              setState(msg.data);
              setPerfAtArrival(performance.now());
            }
          };
          ws.onclose = () => { setConnected(false); timer = setTimeout(connect, 3000); };
          ws.onerror = () => ws.close();
        };
        connect();
        return () => { clearTimeout(timer); if (ws) ws.close(); };
      }, []);
      return { state, connected, perfAtArrival };
    }

    // --- F22 elapsed-counter helpers ---
    // D-5 enforces: performance.now() (monotonic, NOT Date.now()), and
    // setInterval (NOT requestAnimationFrame) so the counter keeps advancing
    // in backgrounded tabs.
    function useTick1s() {
      const [, setT] = useState(0);
      useEffect(() => {
        const id = setInterval(() => setT(t => (t + 1) % 1000000), 1000);
        return () => clearInterval(id);
      }, []);
    }
    function computeElapsedSeconds(serverNow, perfAtArrival, startedAt) {
      if (serverNow == null || startedAt == null) return null;
      const baseElapsed = serverNow - startedAt;
      const drift = (performance.now() - perfAtArrival) / 1000;
      return Math.max(0, Math.floor(baseElapsed + drift));
    }
    // D-7: settle-frame state. When oldest_in_flight transitions non-null →
    // null, render last_tool_completed for ~500ms before clearing. Cleanup
    // returned from useEffect prevents timer leaks if the column unmounts
    // (tombstone, instance removed) during the 500ms window.
    function useSettleFrame(oldestInFlight, lastToolCompleted) {
      const [settle, setSettle] = useState(null);
      const prevRef = useRef(oldestInFlight);
      useEffect(() => {
        const wasInFlight = prevRef.current != null;
        const nowIdle = oldestInFlight == null;
        prevRef.current = oldestInFlight;
        if (wasInFlight && nowIdle && lastToolCompleted) {
          setSettle(lastToolCompleted);
          const t = setTimeout(() => setSettle(null), 500);
          return () => clearTimeout(t);
        }
      }, [oldestInFlight, lastToolCompleted]);
      return settle;
    }

    // --- Format helpers ---
    function fmtDuration(s) {
      if (s < 60) return `${s}s`;
      if (s < 3600) return `${Math.floor(s / 60)}m`;
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      return m ? `${h}h ${m}m` : `${h}h`;
    }
    function fmtAgo(iso) {
      const s = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
      if (s < 5) return "just now";
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      return `${Math.floor(s / 3600)}h ago`;
    }
    function fmtCost(n) { return `$${n.toFixed(3)}`; }
    function fmtTokens(n) {
      if (n < 1000) return String(n);
      if (n < 1_000_000) return `${(n / 1000).toFixed(1)}k`;
      return `${(n / 1_000_000).toFixed(2)}M`;
    }
    function fmtTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
    }

    // Context-window limit per model family. All Claude models we spawn run
    // on the standard 200k tier — the 1M-context beta is not enabled.
    const CONTEXT_WINDOW_LIMIT = 200_000;
    function ctxBarClass(pct) {
      if (pct >= 0.80) return "ctx-danger";
      if (pct >= 0.50) return "ctx-warn";
      return "ctx-ok";
    }

    // --- ContextWindowBar ---
    // Renders the PEAK single-LLM-invocation input from the last turn as
    // utilization vs. the model's context window. This is the actual cliff
    // signal — each tool call inside a turn triggers a separate LLM invocation,
    // and the API bills the SUM (which can be many times the window size for a
    // tool-heavy turn). The peak-per-invocation is what tells you whether any
    // one invocation is near the wall. Tooltip exposes both numbers so the
    // distinction is visible.
    function ContextWindowBar({ lastTurn, totalIn, totalOut }) {
      const peak       = lastTurn && typeof lastTurn.peak_in === "number" ? lastTurn.peak_in : 0;
      const turnSumIn  = lastTurn && typeof lastTurn.in      === "number" ? lastTurn.in      : 0;
      const turnSumOut = lastTurn && typeof lastTurn.out     === "number" ? lastTurn.out     : 0;
      const pct  = Math.min(1, peak / CONTEXT_WINDOW_LIMIT);
      const cls  = ctxBarClass(pct);
      const widthPct = (pct * 100).toFixed(1) + "%";
      const tooltip =
        `peak invocation: ${peak.toLocaleString()} in` +
        ` (${(pct * 100).toFixed(0)}% of ${fmtTokens(CONTEXT_WINDOW_LIMIT)} window)\n` +
        `last turn billed: ${turnSumIn.toLocaleString()} in · ${turnSumOut.toLocaleString()} out` +
        ` (sum across all LLM calls in the turn)\n` +
        `cumulative: ${totalIn.toLocaleString()} in · ${totalOut.toLocaleString()} out`;
      return (
        <span className="ctx-window-bar" title={tooltip}>
          <span className="ctx-window-bar-track">
            <span className={`ctx-window-bar-fill ${cls}`} style={{ width: widthPct }}/>
          </span>
          <span>{fmtTokens(peak)}/{fmtTokens(CONTEXT_WINDOW_LIMIT)}</span>
        </span>
      );
    }

    // --- StatusDot ---
    function StatusDot({ status, size = 6 }) {
      return <span className={`dot ${status}`} style={{ width: size, height: size }}/>;
    }

    // Map a full Claude model id ("claude-opus-4-7") OR a short family
    // name ("opus") to its short family name. Returns the input unchanged
    // when it doesn't match a known family.
    function modelFamily(id) {
      if (!id) return id;
      const s = String(id).toLowerCase();
      if (s.includes("opus")) return "opus";
      if (s.includes("sonnet")) return "sonnet";
      if (s.includes("haiku")) return "haiku";
      return s;
    }

    // --- ModelBadge ---
    // Renders the model family. Prefers `activeModel` (API-authoritative,
    // from AssistantMessage.model) over `model` (the configured/intended
    // value). When falling back to the configured value (no assistant turn
    // observed yet), renders dim/italic so operators can tell intent vs.
    // observed at a glance. Tooltip carries the full ids for inspection.
    function ModelBadge({ model, activeModel }) {
      const observed = !!activeModel;
      const displayId = activeModel || model;
      const fam = modelFamily(displayId);
      const map = {
        "opus":   { hue: 290, label: "opus" },
        "sonnet": { hue: 220, label: "sonnet" },
        "haiku":  { hue: 150, label: "haiku" },
      };
      const m = map[fam] || { hue: 250, label: fam };
      const fg = `oklch(0.42 0.10 ${m.hue})`;
      const bg = `oklch(0.42 0.10 ${m.hue} / 0.10)`;
      const bd = `oklch(0.42 0.10 ${m.hue} / 0.30)`;
      const title = observed
        ? `active model: ${activeModel}`
        : `configured: ${model || "(unknown)"} — no assistant response observed yet`;
      return (
        <span className="mono" title={title} style={{
          display: "inline-flex", alignItems: "center", height: 18,
          padding: "0 6px", borderRadius: 4, fontSize: 10.5,
          color: fg, background: bg, border: `1px solid ${bd}`,
          letterSpacing: "0.02em", textTransform: "lowercase",
          opacity: observed ? 1 : 0.55,
          fontStyle: observed ? "normal" : "italic",
        }}>{m.label}</span>
      );
    }

    // --- AgentAvatar ---
    function AgentAvatar({ id, role, size = 22 }) {
      const hue = (() => {
        let h = 0;
        for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) % 360;
        return h;
      })();
      const initial = role.slice(0, 1).toUpperCase();
      return (
        <span className="mono" style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          width: size, height: size, borderRadius: 4,
          background: `oklch(0.75 0.05 ${hue} / 0.5)`,
          border: `1px solid oklch(0.60 0.07 ${hue} / 0.4)`,
          color: `oklch(0.25 0.06 ${hue})`,
          fontSize: Math.round(size * 0.5), fontWeight: 600, flexShrink: 0,
        }}>{initial}</span>
      );
    }

    // --- Icon ---
    const Icon = {
      folder: (props) => (
        <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.4" {...props}>
          <path d="M2 4.5a1 1 0 0 1 1-1h2.5l1 1H11a1 1 0 0 1 1 1V11a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
        </svg>
      ),
    };

    // --- Metric ---
    function Metric({ label, value }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", lineHeight: 1.1 }}>
          <span className="mono" style={{ fontSize: 14, fontWeight: 600 }}>{value}</span>
          <span style={{ fontSize: 10, color: "var(--fg-3)", textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</span>
        </div>
      );
    }

    // --- StatusPill ---
    function StatusPill({ status, count }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, color: "var(--fg-1)" }}>
          <span className={`dot ${status}`}/>
          <span className="mono" style={{ fontWeight: 600 }}>{count}</span>
          <span style={{ color: "var(--fg-3)" }}>{status === "tool-use" ? "tool" : status}</span>
        </div>
      );
    }

    // --- ConfigChips ---
    function ConfigChips({ config, onClick }) {
      if (!config) return null;
      const chips = [];
      chips.push({ key: 'tools', text: `${(config.tools || []).length} tools` });
      // lead-extends-teammate-tools-and-skills: show "+N extras" chip for lead-extended tools
      const extrasArr = config.extra_tools || [];
      if (extrasArr.length > 0) chips.push({ key: 'extras', text: `+${extrasArr.length} extra${extrasArr.length === 1 ? '' : 's'}`, extra: true });
      const skillsArr = Array.isArray(config.skills) ? config.skills : (config.skills ? [config.skills] : []);
      if (skillsArr.length > 0) chips.push({ key: 'skills', text: `${skillsArr.length} skills` });
      if (config.permission_mode) chips.push({ key: 'perm', text: config.permission_mode });
      const mcpArr = config.mcp_servers || [];
      if (mcpArr.length > 0) chips.push({ key: 'mcp', text: `${mcpArr.length} MCP` });
      if (chips.length === 0) return null;
      return (
        <div className="tm-config-chips" onClick={onClick} title="Click to view full config">
          {chips.map(c => (
            <span key={c.key} className={c.extra ? "tm-config-chip tm-config-chip-extra" : "tm-config-chip"}>{c.text}</span>
          ))}
        </div>
      );
    }

    // --- EffortValue ---
    // Renders the effort row in ConfigDetailPanel. Surfaces the gap between
    // what the operator asked for (spawn-time kwarg) and what the teammate
    // actually ran with (resolved value). Branches, in priority order:
    //   1. Override + diverging pack default → render "<pack> → <resolved>
    //      (requested override)" so the override is unmistakable.
    //   2. Override + no pack default → render "<resolved> (requested override)"
    //      so the operator sees their override didn't have anything to override.
    //   3. No override + pack default matches resolved → "<resolved>
    //      (pack default)" — origin is clear, no divergence to flag.
    //   4. Fallback (override matches pack, or no provenance info on snapshot)
    //      → plain "<resolved>".
    function EffortValue({ resolved, requested, packDefault }) {
      const hasOverride = requested != null;
      const hasPack = packDefault != null;

      if (hasOverride && hasPack && requested !== packDefault) {
        return (
          <div className="tm-detail-value" style={{ display: "flex", alignItems: "baseline", gap: 6, flexWrap: "wrap" }}>
            <span style={{ color: "var(--fg-3)", textDecoration: "line-through" }}>
              {packDefault}
            </span>
            <span style={{ color: "var(--fg-3)" }}>→</span>
            <span>{resolved}</span>
            <span style={{ color: "var(--fg-3)", fontWeight: 400, fontSize: 11 }}>
              (requested override)
            </span>
          </div>
        );
      }
      if (hasOverride && !hasPack) {
        return (
          <div className="tm-detail-value">
            {resolved}
            <span style={{ color: "var(--fg-3)", fontWeight: 400, marginLeft: 6, fontSize: 11 }}>
              (requested override; no pack default)
            </span>
          </div>
        );
      }
      // No override, pack default present. By construction in
      // broker._snapshot_config, resolved == packDefault here — the equality
      // is invariant, not a guard. (Sentinel L-2.)
      if (!hasOverride && hasPack) {
        return (
          <div className="tm-detail-value">
            {resolved}
            <span style={{ color: "var(--fg-3)", fontWeight: 400, marginLeft: 6, fontSize: 11 }}>
              (pack default)
            </span>
          </div>
        );
      }
      // Fallback: override == pack default (nothing to highlight), or
      // snapshot lacks provenance fields entirely (legacy).
      return <div className="tm-detail-value">{resolved}</div>;
    }

    // --- ConfigDetailPanel ---
    function ConfigDetailPanel({ config, agentRole, configuredModel, activeModel, onClose }) {
      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [onClose]);

      const skillsArr = Array.isArray(config.skills) ? config.skills : (config.skills ? [config.skills] : []);
      const toolsArr = config.tools || [];
      const dtArr = config.disallowed_tools || [];
      const mcpArr = config.mcp_servers || [];
      // lead-extends-teammate-tools-and-skills: split tools into Pack/Extras when extras present
      const extrasArr = config.extra_tools || [];
      const packToolsArr = extrasArr.length > 0 ? toolsArr.filter(t => !extrasArr.includes(t)) : toolsArr;

      return ReactDOM.createPortal(
        <div className="tm-detail-backdrop" onClick={onClose}>
          <div className="tm-detail-panel" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
              <span style={{ fontWeight: 600, fontSize: 14 }}>{agentRole} — config</span>
              <button onClick={onClose} style={{
                background: 'none', border: 'none', cursor: 'pointer',
                color: 'var(--fg-3)', fontSize: 16, lineHeight: 1,
              }}>✕</button>
            </div>

            {(config.model || configuredModel || activeModel) && (() => {
              // Render the model chain: pack → override → active. Collapse to a
              // single "active" line when all three resolve to the same family.
              // - pack:     config.model is the AgentDefinition.model (resolved
              //             from pack frontmatter). The "intended default" for
              //             this role.
              // - override: configuredModel (agent.model on /api/state) is the
              //             value passed at spawn (or pack default normalized).
              //             A user-supplied override is detected by family-level
              //             divergence from the pack value.
              // - active:   activeModel is API-authoritative (the model the
              //             Anthropic API actually used on the last response).
              const pack = config.model || null;
              const override = configuredModel || null;
              const active = activeModel || null;
              const packFam = pack ? modelFamily(pack) : null;
              const overrideFam = override ? modelFamily(override) : null;
              const activeFam = active ? modelFamily(active) : null;
              // Detect a "real" override: configured family differs from pack.
              const overrideDiffers =
                override && pack && overrideFam !== packFam;
              // Active diverges when it's observed AND it doesn't match
              // whichever upstream we trust (override > pack).
              const upstreamFam = overrideDiffers ? overrideFam : packFam;
              const activeDiverges = active && upstreamFam && activeFam !== upstreamFam;
              const collapse = !overrideDiffers && !activeDiverges;
              return (
                <div className="tm-detail-section">
                  <div className="tm-detail-label">model</div>
                  {collapse ? (
                    <div className="tm-detail-value">
                      {active || override || pack}
                      {!active && (
                        <span style={{ color: "var(--fg-3)", marginLeft: 6, fontStyle: "italic" }}>
                          (configured; no API response observed yet)
                        </span>
                      )}
                    </div>
                  ) : (
                    <div className="tm-detail-value" style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                      {pack && (
                        <div>
                          <span style={{ color: "var(--fg-3)" }}>pack default: </span>
                          <span>{pack}</span>
                        </div>
                      )}
                      {overrideDiffers && (
                        <div>
                          <span style={{ color: "var(--fg-3)" }}>spawn override: </span>
                          <span>{override}</span>
                        </div>
                      )}
                      <div>
                        <span style={{ color: "var(--fg-3)" }}>active (API): </span>
                        <span>
                          {active || (
                            <em style={{ color: "var(--fg-3)" }}>not observed yet</em>
                          )}
                        </span>
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            {(config.permission_mode || config.effort) && (
              <div style={{ display: 'flex', gap: 24 }}>
                {config.permission_mode && (
                  <div className="tm-detail-section">
                    <div className="tm-detail-label">permission mode</div>
                    <div className="tm-detail-value">{config.permission_mode}</div>
                  </div>
                )}
                {config.effort && (
                  <div className="tm-detail-section">
                    <div className="tm-detail-label">effort</div>
                    <EffortValue
                      resolved={config.effort}
                      requested={config.effort_requested}
                      packDefault={config.effort_pack_default}
                    />
                  </div>
                )}
              </div>
            )}

            {toolsArr.length > 0 && extrasArr.length === 0 && (
              <div className="tm-detail-section">
                <div className="tm-detail-label">tools ({toolsArr.length})</div>
                <ul className="tm-detail-list">
                  {toolsArr.map(t => <li key={t} className="tm-detail-list-item">{t}</li>)}
                </ul>
              </div>
            )}
            {toolsArr.length > 0 && extrasArr.length > 0 && (
              <>
                <div className="tm-detail-section">
                  <div className="tm-detail-label">pack ({packToolsArr.length})</div>
                  <ul className="tm-detail-list">
                    {packToolsArr.map(t => <li key={t} className="tm-detail-list-item">{t}</li>)}
                  </ul>
                </div>
                <div className="tm-detail-section">
                  <div className="tm-detail-label">extras (+{extrasArr.length})</div>
                  <ul className="tm-detail-list">
                    {extrasArr.map(t => <li key={t} className="tm-detail-list-item">{t}</li>)}
                  </ul>
                </div>
              </>
            )}

            {dtArr.length > 0 && (
              <div className="tm-detail-section">
                <div className="tm-detail-label">disallowed tools</div>
                <ul className="tm-detail-list">
                  {dtArr.map(t => <li key={t} className="tm-detail-list-item">{t}</li>)}
                </ul>
              </div>
            )}

            {skillsArr.length > 0 && (
              <div className="tm-detail-section">
                <div className="tm-detail-label">skills</div>
                <ul className="tm-detail-list">
                  {skillsArr.map(s => <li key={s} className="tm-detail-list-item">{s}</li>)}
                </ul>
              </div>
            )}

            {mcpArr.length > 0 && (
              <div className="tm-detail-section">
                <div className="tm-detail-label">MCP servers</div>
                <ul className="tm-detail-list">
                  {mcpArr.map(s => <li key={s} className="tm-detail-list-item">{s}</li>)}
                </ul>
              </div>
            )}

            <div className="tm-detail-section">
              <div className="tm-detail-label">system prompt</div>
              {config.system_prompt
                ? <pre className="tm-detail-prompt">{config.system_prompt}</pre>
                : <div className="tm-detail-value" style={{ color: 'var(--fg-3)' }}>(none)</div>
              }
            </div>
          </div>
        </div>,
        document.body,
      );
    }

    // --- MCTopBar ---
    function MCTopBar({ instances, connected }) {
      const totals = instances.reduce((acc, i) => {
        const live = i.agents.filter(a => a.dead !== true);
        acc.agents += live.length;
        acc.cost += i.cost;
        acc.in += i.tokens.in;
        acc.out += i.tokens.out;
        acc.byStatus.thinking += live.filter(a => a.status === "thinking").length;
        acc.byStatus.tool += live.filter(a => a.status === "tool-use").length;
        acc.byStatus.idle += live.filter(a => a.status === "idle").length;
        acc.byStatus.waiting += live.filter(a => a.status === "waiting").length;
        return acc;
      }, { agents: 0, cost: 0, in: 0, out: 0, byStatus: { thinking: 0, tool: 0, idle: 0, waiting: 0 } });

      const connDot = {
        width: 6, height: 6, borderRadius: "50%", flexShrink: 0,
        background: connected ? "var(--st-done)" : "var(--st-thinking)",
        display: "inline-block",
        title: connected ? "Connected" : "Reconnecting…",
      };

      return (
        <div style={{
          height: 56, padding: "0 22px",
          display: "flex", alignItems: "center", gap: 18,
          borderBottom: "1px solid var(--line)",
          background: "var(--bg-0)",
          flexShrink: 0,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <svg width="14" height="14" viewBox="0 0 14 14">
              <circle cx="7" cy="7" r="2" fill="oklch(0.50 0.14 220)"/>
              <circle cx="7" cy="7" r="5" fill="none" stroke="oklch(0.50 0.14 220 / 0.4)"/>
            </svg>
            <span style={{ fontWeight: 600, fontSize: 13 }}>claude-crew</span>
            <span className="chip">mission control</span>
            <span
              style={connDot}
              title={connected ? "Connected" : "Reconnecting…"}
            />
          </div>

          <div style={{ marginLeft: "auto", display: "flex", gap: 22, alignItems: "center" }}>
            <Metric label="instances" value={instances.length}/>
            <Metric label="agents" value={totals.agents}/>
            <Metric label="cost" value={`$${totals.cost.toFixed(2)}`}/>
            <Metric label="tokens" value={fmtTokens(totals.in + totals.out)}/>
            <div style={{ width: 1, height: 24, background: "var(--line)" }}/>
            <StatusPill status="thinking" count={totals.byStatus.thinking}/>
            <StatusPill status="tool-use" count={totals.byStatus.tool}/>
            <StatusPill status="waiting" count={totals.byStatus.waiting}/>
            <StatusPill status="idle" count={totals.byStatus.idle}/>
          </div>
        </div>
      );
    }

    // --- InstanceStrip ---
    function InstanceStrip({ instances, activeId, onSelect }) {
      return (
        <div style={{
          display: "flex", gap: 10, padding: "12px 22px",
          borderBottom: "1px solid var(--line)", background: "var(--bg-0)",
          overflowX: "auto", flexShrink: 0,
        }}>
          {instances.map(cli => {
            const active = cli.id === activeId;
            const unreachable = cli.status === "unreachable";
            const liveAgentsLocal = cli.agents.filter(a => a.dead !== true);
            const statuses = liveAgentsLocal.map(a => a.status);
            const borderColor = unreachable ? "oklch(0.60 0.15 25 / 0.30)" : active ? "var(--accent-line)" : "var(--line)";
            return (
              <div key={cli.id} onClick={() => onSelect(cli.id)} style={{
                flex: "1 0 280px", minWidth: 280,
                padding: "12px 14px", cursor: "pointer",
                borderRadius: 6,
                background: active ? "var(--bg-2)" : "var(--bg-1)",
                border: `1px solid ${borderColor}`,
                opacity: unreachable ? 0.6 : 1,
                position: "relative",
              }}>
                {active && !unreachable && <div style={{ position: "absolute", left: -1, top: 8, bottom: 8, width: 2, background: "var(--accent)", borderRadius: 999 }}/>}
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <StatusDot status={unreachable ? "unreachable" : "active"}/>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{cli.label}</span>
                  {cli.is_local && (
                    <span style={{
                      display: "inline-flex", alignItems: "center", height: 16, padding: "0 6px",
                      borderRadius: 3, fontSize: 9.5, fontWeight: 600, letterSpacing: "0.05em",
                      textTransform: "uppercase", color: "var(--accent)",
                      background: "var(--accent-soft)", border: "1px solid var(--accent-line)",
                    }}>local</span>
                  )}
                  <span className="mono" style={{ fontSize: 10.5, color: "var(--fg-3)", marginLeft: "auto" }}>{cli.id}</span>
                </div>
                <div style={{ fontSize: 11, color: "var(--fg-2)", marginTop: 3, display: "flex", alignItems: "center", gap: 6 }} className="mono">
                  {unreachable ? (
                    <span style={{ color: "var(--st-error)", opacity: 0.8 }}>unreachable</span>
                  ) : (
                    <><Icon.folder/>{cli.cwd}</>
                  )}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 9 }}>
                  {unreachable
                    ? <span style={{ fontSize: 11, color: "var(--fg-3)" }}>—</span>
                    : statuses.map((s, i) => <span key={i} className={`dot ${s}`}/>)
                  }
                  <span style={{ marginLeft: "auto", fontSize: 11, color: "var(--fg-2)" }}>
                    <span className="mono" style={{ color: unreachable ? "var(--fg-3)" : "var(--fg-0)" }}>{liveAgentsLocal.length}</span>
                    {" "}agents · <span className="mono" style={{ color: unreachable ? "var(--fg-3)" : "var(--fg-0)" }}>{fmtCost(cli.cost)}</span>
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // --- MiniGraph ---
    function MiniGraph({ cli, agents }) {
      const W = 290, H = 320;
      const center = { x: W / 2, y: H / 2 - 10 };
      const r = 95;
      const positions = agents.map((a, i) => {
        const t = (i / agents.length) * Math.PI * 2 - Math.PI / 2;
        return { ...a, x: center.x + Math.cos(t) * r, y: center.y + Math.sin(t) * r };
      });

      return (
        <div style={{ borderRight: "1px solid var(--line)", padding: "16px 18px", display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <div style={{ fontSize: 10.5, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--fg-2)", marginBottom: 4 }}>
            Topology
          </div>
          <div style={{ fontSize: 12, color: "var(--fg-2)", marginBottom: 8 }}>{cli.label}</div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 320 }}>
            <defs>
              <radialGradient id="mcCenter" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="oklch(0.50 0.14 220 / 0.20)"/>
                <stop offset="100%" stopColor="oklch(0.50 0.14 220 / 0)"/>
              </radialGradient>
            </defs>
            {positions.map(p => (
              <line key={`e-${p.id}`} x1={center.x} y1={center.y} x2={p.x} y2={p.y}
                stroke="oklch(0.75 0.01 250)" strokeWidth="1"/>
            ))}
            <circle cx={center.x} cy={center.y} r="40" fill="url(#mcCenter)"/>
            <circle cx={center.x} cy={center.y} r="22" fill="var(--bg-2)" stroke="var(--accent-line)"/>
            <text x={center.x} y={center.y + 4} textAnchor="middle" fontSize="10" fontFamily="var(--font-mono)" fill="var(--fg-0)">lead</text>
            {positions.map(p => (
              <g key={p.id} transform={`translate(${p.x} ${p.y})`}>
                <circle r="14" fill="var(--bg-2)" stroke="var(--line)"/>
                <circle r="4" fill={
                  p.status === "thinking" ? "var(--st-thinking)" :
                  p.status === "tool-use" ? "var(--st-tool)" :
                  p.status === "waiting"  ? "var(--st-waiting)" :
                  "var(--st-idle)"
                }>
                  {(p.status === "thinking" || p.status === "tool-use") &&
                    <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
                  }
                </circle>
                <text y="26" textAnchor="middle" fontSize="9" fontFamily="var(--font-mono)" fill="var(--fg-2)">{p.id.slice(0, 8)}</text>
              </g>
            ))}
            {positions.filter(p => p.status === "thinking" || p.status === "tool-use").map((p, i) => (
              <circle key={`pulse-${p.id}`} r="2" fill="var(--accent)">
                <animateMotion dur={`${2.4 + i * 0.3}s`} repeatCount="indefinite"
                  path={`M ${p.x} ${p.y} L ${center.x} ${center.y}`}/>
                <animate attributeName="opacity" values="0;1;0" dur={`${2.4 + i * 0.3}s`} repeatCount="indefinite"/>
              </circle>
            ))}
          </svg>

          <div style={{ marginTop: "auto", display: "flex", flexDirection: "column", gap: 4, fontSize: 11, color: "var(--fg-2)" }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span>cwd</span><span className="mono" style={{ color: "var(--fg-0)" }}>{cli.cwd}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span>branch</span><span className="mono" style={{ color: "var(--accent)" }}>{cli.branch}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span>uptime</span><span className="mono" style={{ color: "var(--fg-0)" }}>{fmtDuration(cli.uptime)}</span>
            </div>
          </div>
        </div>
      );
    }

    // --- MiniMessage ---
    function MiniMessage({ msg, agentMap }) {
      const isTool = msg.kind === "tool";
      const isThinking = msg.kind === "thinking";
      const isFromLead = msg.from === "lead";
      const recipient = msg.to && !msg.to.startsWith("broker:") ? agentMap[msg.to] : null;
      const sender = msg.from && msg.from !== "lead" ? agentMap[msg.from] : null;
      return (
        <div style={{
          padding: "7px 0", borderBottom: "1px solid var(--line-soft)",
          opacity: isFromLead ? 0.75 : 1,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10.5, color: "var(--fg-3)", marginBottom: 3 }}>
            {isFromLead
              ? <span style={{ color: "var(--fg-2)", fontWeight: 600 }}>lead</span>
              : <span style={{ color: "var(--fg-1)", fontWeight: 600 }}>{sender ? sender.role : msg.from}</span>
            }
            <span style={{ color: "var(--fg-3)" }}>→</span>
            {recipient
              ? <span style={{ color: "var(--fg-2)" }}>{recipient.role}</span>
              : <span className="mono">{msg.to === "lead" ? "lead" : msg.to}</span>
            }
            <span className="mono" style={{ marginLeft: "auto" }}>{fmtTime(msg.t)}</span>
          </div>
          {isTool ? (
            <div style={{
              fontFamily: "var(--font-mono)", fontSize: 11.5,
              background: "var(--bg-2)", border: "1px solid var(--line)",
              borderRadius: 4, padding: "5px 7px",
              display: "flex", alignItems: "center", gap: 6,
            }}>
              <span style={{ color: "var(--st-tool)" }}>▸</span>
              <span style={{ color: "var(--fg-0)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{msg.body}</span>
            </div>
          ) : isThinking ? (
            <div style={{ fontSize: 11.5, color: "var(--fg-2)", fontStyle: "italic" }}>{msg.body}</div>
          ) : (
            <div style={{ fontSize: 12, color: isFromLead ? "var(--fg-2)" : "var(--fg-0)", textWrap: "pretty", wordBreak: "break-word", whiteSpace: "pre-wrap" }}>{msg.body}</div>
          )}
        </div>
      );
    }

    // --- AgentStreamColumn ---
    // F22: elapsed counter, accent bar, tool chip, settle frame.
    // Shared between AgentStreamColumn (column header) and RosterRow (left rail).
    function useToolChip(agent, serverNow, perfAtArrival) {
      useTick1s();  // 1Hz re-render so the elapsed counter advances between server polls
      const inFlight = agent.oldest_in_flight || null;
      const elapsed = computeElapsedSeconds(
        serverNow,
        perfAtArrival,
        inFlight && inFlight.started_at_wallclock,
      );
      const isStuck = elapsed != null && elapsed >= 5;
      const settle = useSettleFrame(inFlight, agent.last_tool_completed);

      const accentClass = inFlight
        ? (isStuck ? "agent-column-accent stuck" : "agent-column-accent active")
        : "agent-column-accent";

      let chipNode = null;
      if (inFlight) {
        const extraCount = (agent.in_flight_count || 1) - 1;
        chipNode = (
          <span className={isStuck ? "tool-chip stuck" : "tool-chip"}>
            <span className="tool-name">{inFlight.tool_name}</span>
            <span className="tool-elapsed">· {elapsed != null ? elapsed : 0}s</span>
            {extraCount > 0 && <span className="tool-count">+{extraCount}</span>}
          </span>
        );
      } else if (settle) {
        chipNode = (
          <span className="tool-chip settled">
            <span className="tool-name">{settle.tool_name}</span>
            <span className="tool-elapsed">· {Number(settle.duration_seconds).toFixed(1)}s</span>
            <span className="tool-count">✓</span>
          </span>
        );
      }

      return { chipNode, accentClass, isStuck, elapsed, inFlight };
    }

    function AgentStreamColumn({ agent, msgs, agentMap, serverNow, perfAtArrival, onOpenPanel }) {
      const scrollRef = useRef(null);
      const isPinnedRef = useRef(true);

      const handleScroll = () => {
        const el = scrollRef.current;
        if (el) {
          isPinnedRef.current = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
        }
      };

      useEffect(() => {
        const el = scrollRef.current;
        if (el && isPinnedRef.current) el.scrollTop = el.scrollHeight;
      }, [msgs.length]);

      const { chipNode, accentClass } = useToolChip(agent, serverNow, perfAtArrival);

      return (
        <div style={{ display: "flex", flexDirection: "column", borderRight: "1px solid var(--line)", minWidth: 0, overflow: "hidden" }}>
          <div className={accentClass}/>
          <div style={{ padding: "12px 14px", borderBottom: "1px solid var(--line)", background: "var(--bg-1)", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <AgentAvatar id={agent.id} role={agent.role} size={22}/>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ fontSize: 12.5, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                  {agent.name || agent.role}
                  {agent.name && agent.name !== agent.role &&
                    <span style={{ fontWeight: 400, color: "var(--fg-3)", marginLeft: 5, fontSize: 11 }}>{agent.role}</span>
                  }
                </div>
                <div className="mono" style={{ fontSize: 10.5, color: "var(--fg-3)" }}>{agent.id}</div>
              </div>
              <StatusDot status={agent.status}/>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 8 }}>
              <ModelBadge model={agent.model} activeModel={agent.active_model}/>
              <ContextWindowBar
                lastTurn={agent.last_turn || { in: 0, out: 0 }}
                totalIn={agent.tokens.in}
                totalOut={agent.tokens.out}
              />
              <span
                className="mono"
                title={`session cost (cumulative)`}
                style={{ fontSize: 10.5, color: "var(--fg-2)" }}
              >
                {fmtCost(agent.cost)}
              </span>
            </div>
          </div>

          <div style={{
            padding: "6px 14px", fontSize: 10.5, color: "var(--fg-2)",
            display: "flex", alignItems: "center", gap: 6,
            borderBottom: "1px solid var(--line-soft)", background: "var(--bg-0)",
            flexShrink: 0,
          }}>
            <span className={`dot ${agent.status}`}/>
            <span style={{ textTransform: "lowercase" }}>{agent.status}</span>
            <span style={{ marginLeft: "auto", flexShrink: 0 }}>{fmtAgo(agent.lastMsg)}</span>
          </div>

          {agent.config && <ConfigChips config={agent.config} onClick={() => onOpenPanel && onOpenPanel(agent)}/>}

          {/* F22 D-2/D-10: dedicated tool-chip row */}
          <div className="tool-chip-row">{chipNode}</div>

          <div
            ref={scrollRef}
            onScroll={handleScroll}
            style={{ flex: 1, overflowY: "auto", padding: "8px 14px 14px" }}
          >
            {msgs.length === 0 ? (
              <div style={{ color: "var(--fg-3)", fontSize: 11, padding: "12px 0", textAlign: "center" }}>
                No outbound messages.
              </div>
            ) : msgs.map((m, i) => (
              <MiniMessage key={i} msg={m} agentMap={agentMap}/>
            ))}
          </div>
        </div>
      );
    }

    // --- RosterRow / RosterRail (roster-spotlight layout) ---
    //
    // RosterRow surfaces the same scan signals as the column header
    // (avatar, name, role, status, model, ctx-window, cost, tool-chip, ago,
    // accent bar) in a compact two-line row. Clicking toggles whether the
    // agent renders as a full detail column in the spotlight pane.
    function RosterRow({ agent, selected, onToggle, serverNow, perfAtArrival }) {
      const { chipNode, isStuck, inFlight } = useToolChip(agent, serverNow, perfAtArrival);

      const accentMod = inFlight
        ? (isStuck ? "tool-stuck" : "tool-active")
        : "";
      const selMod = selected ? "selected" : "unselected";

      return (
        <div
          className={`roster-row ${selMod} ${accentMod}`.trim()}
          onClick={() => onToggle && onToggle(agent.id)}
          title={agent.id}
        >
          <div className="roster-row-avatar">
            <AgentAvatar id={agent.id} role={agent.role} size={22}/>
          </div>
          <div className="roster-row-identity">
            <span className="roster-row-name">{agent.name || agent.role}</span>
            {agent.name && agent.name !== agent.role && (
              <span className="roster-row-role">{agent.role}</span>
            )}
          </div>
          <div className="roster-row-trailing-top">
            <StatusDot status={agent.status}/>
            <span className="roster-row-cost" title="session cost (cumulative)">
              {fmtCost(agent.cost)}
            </span>
          </div>
          <div className="roster-row-meta">
            <ModelBadge model={agent.model} activeModel={agent.active_model}/>
            <ContextWindowBar
              lastTurn={agent.last_turn || { in: 0, out: 0 }}
              totalIn={agent.tokens.in}
              totalOut={agent.tokens.out}
            />
            <div className="roster-row-tool-slot">{chipNode}</div>
            <div className="roster-row-meta-spacer"/>
            <span className="roster-row-ago">{fmtAgo(agent.lastMsg)}</span>
          </div>
        </div>
      );
    }

    function RosterRail({
      liveAgents,
      selectedIds,           // Set<string> | null   (null = default-all)
      onToggle,
      onSelectAll,
      onClearAll,
      serverNow,
      perfAtArrival,
      terminatedAgents,
      terminatedOpen,
      onToggleTerminated,
      onTerminatedAgentClick,
      startupDiagnostics,
      topologyNode,
    }) {
      const isDefaultAll = selectedIds === null;
      const selectedCount = isDefaultAll
        ? liveAgents.length
        : liveAgents.filter(a => selectedIds.has(a.id)).length;

      return (
        <div style={{
          display: "flex", flexDirection: "column",
          borderRight: "1px solid var(--line)",
          minWidth: 0, minHeight: 0, overflow: "hidden",
          background: "var(--bg-0)",
        }}>
          <div className="roster-section">
            <div className="roster-section-header">
              <span>Crew</span>
              <span className="roster-section-header-count">
                {liveAgents.length === 0
                  ? "(0)"
                  : `(${selectedCount}/${liveAgents.length})`}
              </span>
              <button
                className="roster-section-action"
                onClick={onClearAll}
                disabled={liveAgents.length === 0 || selectedCount === 0}
                title="Hide all from spotlight"
              >Clear</button>
              <button
                className="roster-section-action"
                onClick={onSelectAll}
                disabled={liveAgents.length === 0 || selectedCount === liveAgents.length}
                title="Spotlight all live agents"
              >All</button>
            </div>
            {liveAgents.length === 0 ? (
              <div className="roster-empty">No live agents.</div>
            ) : (
              liveAgents.map(a => (
                <RosterRow
                  key={a.id}
                  agent={a}
                  selected={isDefaultAll || selectedIds.has(a.id)}
                  onToggle={onToggle}
                  serverNow={serverNow}
                  perfAtArrival={perfAtArrival}
                />
              ))
            )}
          </div>

          <StartupNoticesSection diagnostics={startupDiagnostics}/>

          <TerminatedSection
            agents={terminatedAgents}
            isOpen={terminatedOpen}
            onToggle={onToggleTerminated}
            onAgentClick={onTerminatedAgentClick}
          />

          <div className="rail-topology">
            {topologyNode}
          </div>
        </div>
      );
    }

    // --- TerminatedSection (TerminatedRow + TerminatedSection) ---
    function TerminatedRow({ agent, onClick }) {
      const uptime = agent.uptime != null ? fmtDuration(agent.uptime) : '—';
      return (
        <div className="terminated-row" onClick={onClick}>
          <AgentAvatar id={agent.id} role={agent.role} size={18}/>
          <span style={{ fontSize: 12, fontWeight: 600, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {agent.name || agent.role}
          </span>
          {agent.name && agent.name !== agent.role && (
            <span style={{ fontSize: 11, color: 'var(--fg-3)', flexShrink: 0 }}>{agent.role}</span>
          )}
          <span style={{ marginLeft: 'auto', display: 'flex', gap: 8, fontSize: 11, color: 'var(--fg-3)', flexShrink: 0 }}>
            <span className="mono">{uptime}</span>
            <span className="mono">{fmtCost(agent.cost)}</span>
          </span>
        </div>
      );
    }

    function TerminatedSection({ agents, isOpen, onToggle, onAgentClick }) {
      if (agents.length === 0) return null;
      return (
        <div className="terminated-section">
          <button className="terminated-header" onClick={onToggle}>
            <span>{isOpen ? '▼' : '▶'}</span>
            <span>Terminated ({agents.length})</span>
          </button>
          {isOpen && (
            <div className="terminated-list">
              {agents.map(agent => (
                <TerminatedRow key={agent.id} agent={agent} onClick={() => onAgentClick && onAgentClick(agent)}/>
              ))}
            </div>
          )}
        </div>
      );
    }

    // --- StartupNoticesSection (StartupNoticeRow + StartupNoticesSection) ---
    function StartupNoticeRow({ diagnostic }) {
      const level = (diagnostic.level || "INFO").toUpperCase();
      const badgeClass =
        level === "ERROR" ? "startup-notice-badge-error" :
        level === "WARNING" ? "startup-notice-badge-warning" :
        "startup-notice-badge-info";
      const rowClass = level === "INFO"
        ? "startup-notice-row startup-notice-info"
        : "startup-notice-row";
      // source short-name: trim "claude_crew." prefix for compactness
      const source = (diagnostic.source || "").replace(/^claude_crew\./, "");
      return (
        <div className={rowClass}>
          <span className={`startup-notice-badge ${badgeClass}`}>{level}</span>
          <span className="startup-notice-category">[{diagnostic.category}]</span>
          <span className="startup-notice-source">{source}</span>
          <span className="startup-notice-message" title={diagnostic.message}>
            {diagnostic.message}
          </span>
        </div>
      );
    }

    function StartupNoticesSection({ diagnostics }) {
      const [isOpen, setIsOpen] = useState(true);
      const [showInfo, setShowInfo] = useState(false);
      const list = diagnostics || [];
      // WARN+ visible by default (A-3); INFO behind toggle.
      const visible = showInfo
        ? list
        : list.filter(d => (d.level || "INFO").toUpperCase() !== "INFO");
      // Empty list (or only INFOs hidden behind toggle and no warn/error) →
      // panel hidden when nothing the user is asking to see.
      // Spec edge case: empty list ⇒ panel not rendered.
      if (list.length === 0) return null;
      // If everything is INFO and user hasn't toggled, still render the
      // header so the user knows there are notices and can opt in.
      const infoCount = list.filter(d => (d.level || "INFO").toUpperCase() === "INFO").length;
      const warnCount = list.length - infoCount;
      return (
        <div className="startup-notices-section">
          <button className="startup-notices-header" onClick={() => setIsOpen(!isOpen)}>
            <span>{isOpen ? '▼' : '▶'}</span>
            <span>Startup Notices ({list.length})</span>
            {infoCount > 0 && (
              <span
                role="button"
                className="startup-notices-toggle"
                onClick={(e) => { e.stopPropagation(); setShowInfo(s => !s); }}
              >
                {showInfo ? `Hide INFO (${infoCount})` : `Show INFO (${infoCount})`}
              </span>
            )}
          </button>
          {isOpen && (
            <div className="startup-notices-list">
              {visible.map((d, i) => (
                <StartupNoticeRow key={i} diagnostic={d}/>
              ))}
            </div>
          )}
        </div>
      );
    }

    // --- StreamColumns ---
    function StreamColumns({ cli, agents, msgs, agentMap, perfAtArrival, onOpenPanel }) {
      const byAgent = useMemo(() => {
        const out = {};
        agents.forEach(a => { out[a.id] = []; });
        msgs.forEach(m => {
          if (out[m.from]) out[m.from].push(m);         // agent → lead (response)
          else if (m.from === "lead" && out[m.to]) out[m.to].push(m); // lead → agent (prompt)
        });
        return out;
      }, [agents, msgs]);

      if (cli.status === "unreachable") {
        return (
          <div style={{
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6,
            color: "var(--fg-3)", fontSize: 13, fontFamily: "var(--font-mono)",
          }}>
            <span style={{ color: "var(--st-error)", fontSize: 12 }}>⚠</span>
            <span>Instance unreachable</span>
            <span style={{ fontSize: 11, color: "var(--fg-3)" }}>{cli.id}</span>
          </div>
        );
      }

      if (agents.length === 0) {
        return (
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "var(--fg-3)", fontSize: 13, fontFamily: "var(--font-mono)",
          }}>
            No teammates spawned yet.
          </div>
        );
      }

      return (
        <>
          <div style={{
            display: "grid",
            gridTemplateColumns: `repeat(${agents.length}, minmax(220px, 1fr))`,
            minWidth: 0, overflowX: "auto",
          }}>
            {agents.map(a => (
              <AgentStreamColumn
                key={a.id}
                agent={a}
                msgs={byAgent[a.id] || []}
                agentMap={agentMap}
                serverNow={cli.now_wallclock}
                perfAtArrival={perfAtArrival}
                onOpenPanel={onOpenPanel}
              />
            ))}
          </div>
        </>
      );
    }

    // --- MissionControlLayout ---
    function MissionControlLayout({ data, connected, perfAtArrival }) {
      const { instances, transcripts } = data;
      const [activeId, setActiveId] = useState(instances[0].id);
      const [openPanel, setOpenPanel] = useState(null);
      const [terminatedOpen, setTerminatedOpen] = useState({});

      // roster-spotlight: per-instance selection.
      //   selectedByInstance[activeId] === undefined  → "default-all" mode
      //     (every live agent is implicitly spotlighted; no Set materialized yet)
      //   selectedByInstance[activeId] === Set<id>    → explicit selection
      // New spawns auto-join Sets that have been materialized (see useEffect).
      const [selectedByInstance, setSelectedByInstance] = useState({});

      const cli = instances.find(i => i.id === activeId) || instances[0];
      const agentMap = useMemo(
        () => Object.fromEntries(cli.agents.map(a => [a.id, a])),
        [cli],
      );
      const msgs = transcripts[cli.id] || [];
      const liveAgents = (cli.agents || []).filter(a => a.dead !== true);
      const deadAgents = (cli.agents || []).filter(a => a.dead === true);

      const rawSelected = selectedByInstance[activeId];
      const selectedIds = rawSelected === undefined ? null : rawSelected;

      // Per-instance memo of ids the layout has already observed. Used by
      // the auto-include effect to distinguish "newly spawned" (add to
      // selection) from "intentionally deselected" (leave alone).
      const seenIdsByInstanceRef = useRef({});

      // Auto-include new spawns into a materialized Set so the operator's
      // "deselect-some" intent doesn't leak into "ignore-all-future-agents".
      // Only ids that were NOT in the previously-seen set count as newcomers.
      useEffect(() => {
        const seenMap = seenIdsByInstanceRef.current;
        const liveIds = liveAgents.map(a => a.id);
        const prevSeen = seenMap[activeId] || new Set();
        const newcomers = liveIds.filter(id => !prevSeen.has(id));

        // Update seen set to reflect current live roster (forget dead ids
        // so a re-spawned id with the same string would also count as new;
        // in practice ids are uuids and never recur, so this is harmless).
        seenMap[activeId] = new Set(liveIds);

        if (newcomers.length === 0) return;
        if (selectedIds === null) return;  // default-all → newcomers implicitly included

        setSelectedByInstance(prev => {
          const cur = prev[activeId];
          if (!(cur instanceof Set)) return prev;
          const next = new Set(cur);
          newcomers.forEach(id => next.add(id));
          return { ...prev, [activeId]: next };
        });
      }, [activeId, liveAgents.map(a => a.id).join("|")]);

      const onToggleSelection = (id) => {
        setSelectedByInstance(prev => {
          const cur = prev[activeId];
          // Materialize from current liveAgents on first toggle.
          const base = cur instanceof Set
            ? new Set(cur)
            : new Set(liveAgents.map(a => a.id));
          if (base.has(id)) base.delete(id);
          else base.add(id);
          return { ...prev, [activeId]: base };
        });
      };
      const onSelectAll = () => {
        // Revert to default-all (null) — equivalent to "all selected" but
        // also re-enables implicit inclusion of any future spawn.
        setSelectedByInstance(prev => {
          const next = { ...prev };
          delete next[activeId];
          return next;
        });
      };
      const onClearAll = () => {
        setSelectedByInstance(prev => ({ ...prev, [activeId]: new Set() }));
      };

      const spotlightedAgents = selectedIds === null
        ? liveAgents
        : liveAgents.filter(a => selectedIds.has(a.id));

      return (
        <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: "var(--bg-0)", overflow: "hidden" }}>
          <MCTopBar instances={instances} connected={connected}/>
          <InstanceStrip instances={instances} activeId={activeId} onSelect={setActiveId}/>
          <div style={{ flex: 1, display: "grid", gridTemplateColumns: "320px minmax(0, 1fr)", minHeight: 0 }}>
            <RosterRail
              liveAgents={liveAgents}
              selectedIds={selectedIds}
              onToggle={onToggleSelection}
              onSelectAll={onSelectAll}
              onClearAll={onClearAll}
              serverNow={cli.now_wallclock}
              perfAtArrival={perfAtArrival}
              terminatedAgents={deadAgents}
              terminatedOpen={terminatedOpen[activeId] === true}
              onToggleTerminated={() => setTerminatedOpen(o => ({...o, [activeId]: !(o[activeId] === true)}))}
              onTerminatedAgentClick={setOpenPanel}
              startupDiagnostics={cli.startup_diagnostics || []}
              topologyNode={<MiniGraph cli={cli} agents={liveAgents}/>}
            />
            <div style={{ display: "flex", flexDirection: "column", minHeight: 0, overflow: "hidden" }}>
              {liveAgents.length > 0 && spotlightedAgents.length === 0 ? (
                <div className="spotlight-empty">
                  No agents spotlighted.<br/>
                  Click roster rows on the left to bring agents into focus,<br/>
                  or press <strong>All</strong> to spotlight every live agent.
                </div>
              ) : (
                <div style={{ flex: 1, minHeight: 0, overflow: "hidden", display: "flex" }}>
                  <StreamColumns cli={cli} agents={spotlightedAgents} msgs={msgs} agentMap={agentMap} perfAtArrival={perfAtArrival} onOpenPanel={setOpenPanel}/>
                </div>
              )}
            </div>
          </div>
          {openPanel && openPanel.config && (
            <ConfigDetailPanel
              config={openPanel.config}
              agentRole={openPanel.role}
              configuredModel={openPanel.model}
              activeModel={openPanel.active_model}
              onClose={() => setOpenPanel(null)}
            />
          )}
        </div>
      );
    }

    // --- App ---
    function App() {
      const { state, connected, perfAtArrival } = useLiveState();
      if (!state) {
        return (
          <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg-0)", color: "var(--fg-3)", fontFamily: "var(--font-mono)", fontSize: 13 }}>
            Connecting to claude-crew…
          </div>
        );
      }
      return <MissionControlLayout data={state} connected={connected} perfAtArrival={perfAtArrival}/>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
